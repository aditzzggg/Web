<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinity AI · Next‑Gen Chat</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js untuk analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        :root {
            --bg-dark: #0b0f1a;
            --bg-card: #151e2f;
            --primary: #5f7ef2;
            --primary-glow: rgba(95, 126, 242, 0.3);
            --secondary: #ffb86b;
            --text: #eef2fb;
            --text-muted: #8f9bb3;
            --border: #2a3440;
            --danger: #f56565;
            --success: #4caf50;
            --sidebar-width: 280px;
            --glass: rgba(21, 30, 47, 0.8);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        body.light {
            --bg-dark: #f0f3f8;
            --bg-card: #ffffff;
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.2);
            --secondary: #f97316;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --glass: rgba(255, 255, 255, 0.8);
        }
        body {
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s, color 0.2s;
        }
        #app {
            width: 100%;
            max-width: 1600px;
            height: 95vh;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .page {
            display: none;
            width: 100%;
            height: 100%;
        }
        .page.active {
            display: block;
        }

        /* Auth Pages */
        .auth-wrapper {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 40%, var(--primary-glow), transparent 40%);
        }
        .auth-card {
            width: 420px;
            background: var(--bg-card);
            border-radius: 40px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 30px 60px -15px black;
            animation: float 6s ease infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .auth-card h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .auth-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 30px;
            font-size: 1rem;
            color: var(--text);
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        .auth-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .btn {
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--primary);
            color: white;
            width: 100%;
            font-size: 1rem;
            box-shadow: 0 8px 20px -8px var(--primary);
        }
        .btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            box-shadow: none;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .error {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: -8px;
            margin-bottom: 12px;
        }

        /* ========== USER CHAT ========== */
        .chat-layout {
            display: flex;
            height: 100%;
        }
        .chat-sidebar {
            width: var(--sidebar-width);
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
        }
        .chat-sidebar h3 {
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }
        .history-list {
            flex: 1;
            overflow-y: auto;
        }
        .history-item {
            padding: 14px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item:hover {
            background: var(--primary-glow);
            border-color: var(--primary);
        }
        .new-chat-btn {
            margin-top: 16px;
            background: transparent;
            border: 1px dashed var(--border);
            color: var(--text);
            padding: 14px;
            border-radius: 30px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px 32px;
            background: var(--bg-dark);
        }
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-card);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-card);
            border-radius: 32px;
            padding: 30px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message {
            max-width: 70%;
            animation: messagePop 0.3s ease;
        }
        @keyframes messagePop {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
        }
        .message-bubble {
            padding: 16px 22px;
            border-radius: 30px;
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px -8px var(--primary);
        }
        .message.ai .message-bubble {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
            box-shadow: none;
        }
        .message pre {
            background: #0d1117;
            padding: 16px;
            border-radius: 20px;
            overflow-x: auto;
            position: relative;
            margin: 12px 0;
        }
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #2d333b;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .chat-input-area {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            background: var(--bg-card);
            border-radius: 60px;
            padding: 8px 8px 8px 24px;
            border: 1px solid var(--border);
        }
        .chat-input-area textarea {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 0;
            color: var(--text);
            font-size: 1rem;
            resize: none;
            max-height: 120px;
        }
        .chat-input-area textarea:focus {
            outline: none;
        }
        .chat-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            color: var(--text-muted);
        }
        .chat-actions {
            display: flex;
            gap: 12px;
        }
        .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px 18px;
            color: var(--text);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .icon-btn:hover {
            background: var(--primary-glow);
            border-color: var(--primary);
        }

        /* ========== ADMIN PANEL ========== */
        .admin-layout {
            display: flex;
            height: 100%;
        }
        .admin-sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            overflow-y: auto;
        }
        .admin-sidebar h2 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .admin-nav-btn {
            padding: 14px 18px;
            border-radius: 20px;
            background: transparent;
            border: none;
            color: var(--text);
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .admin-nav-btn:hover, .admin-nav-btn.active {
            background: var(--primary-glow);
            color: var(--primary);
        }
        .admin-main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: var(--bg-dark);
        }
        .admin-section {
            display: none;
            animation: fade 0.3s;
        }
        .admin-section.active {
            display: block;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
            gap: 24px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 28px;
            border: 1px solid var(--border);
        }
        .stat-card .value {
            font-size: 3rem;
            font-weight: 700;
        }
        table {
            width: 100%;
            background: var(--bg-card);
            border-radius: 24px;
            border-collapse: collapse;
            overflow: hidden;
        }
        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: rgba(255,255,255,0.05);
            font-weight: 600;
        }
        .badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            background: var(--primary-glow);
            color: var(--primary);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 30px;
            color: var(--text);
        }
        .back-btn {
            margin-bottom: 20px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px 20px;
            color: var(--text);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
    </style>
<body>
    <div id="app">
        <!-- LOGIN PAGE -->
        <div id="login-page" class="page active">
            <div class="auth-wrapper">
                <div class="auth-card">
                    <h2><i class="fas fa-robot"></i> Trinity AI</h2>
                    <p style="margin-bottom: 28px; color: var(--text-muted);">Masuk ke akun Anda</p>
                    <input type="email" id="login-email" class="auth-input" placeholder="Email" value="admin@trinity.ai">
                    <input type="password" id="login-password" class="auth-input" placeholder="Password" value="admin123#">
                    <button class="btn" id="login-btn">Masuk</button>
                    <div id="login-error" class="error"></div>
                    <div class="auth-footer">
                        Belum punya akun? <a href="#" id="go-to-register">Daftar</a>
                    </div>
                    <div style="margin-top: 20px; font-size:0.9rem; background: var(--primary-glow); padding:12px; border-radius:20px;">
                        <strong>Demo Admin:</strong> admin@trinity.ai / admin123#
                    </div>
                </div>
            </div>
        </div>

        <!-- REGISTER PAGE -->
        <div id="register-page" class="page">
            <div class="auth-wrapper">
                <div class="auth-card">
                    <h2><i class="fas fa-user-plus"></i> Daftar</h2>
                    <p style="margin-bottom: 28px;">Buat akun baru</p>
                    <input type="email" id="reg-email" class="auth-input" placeholder="Email">
                    <input type="password" id="reg-password" class="auth-input" placeholder="Password (min 6)">
                    <input type="password" id="reg-confirm" class="auth-input" placeholder="Konfirmasi">
                    <button class="btn" id="register-btn">Daftar</button>
                    <div id="register-error" class="error"></div>
                    <div class="auth-footer">
                        Sudah punya akun? <a href="#" id="go-to-login">Masuk</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- USER CHAT PAGE -->
        <div id="user-page" class="page">
            <div class="chat-layout">
                <div class="chat-sidebar">
                    <h3><i class="fas fa-history"></i> Riwayat</h3>
                    <div class="history-list" id="history-list"></div>
                    <button class="new-chat-btn" id="new-chat"><i class="fas fa-plus"></i> Chat Baru</button>
                    <div style="margin-top:20px;">
                        <button class="icon-btn" id="theme-toggle-user"><i class="fas fa-moon"></i> Tema</button>
                    </div>
                </div>
                <div class="chat-main">
                    <div class="chat-header">
                        <div style="display:flex; align-items:center; gap:16px;">
                            <h2><i class="fas fa-comment-dots" style="color:var(--primary);"></i> Trinity AI</h2>
                            <select id="prompt-template-select" class="form-control" style="width:auto; padding:8px 16px;">
                                <option value="">Template default</option>
                            </select>
                        </div>
                        <div class="user-badge">
                            <i class="fas fa-user-circle"></i>
                            <span id="user-email"></span>
                            <button class="icon-btn" id="user-logout" style="border:none;"><i class="fas fa-sign-out-alt"></i></button>
                        </div>
                    </div>
                    <div class="chat-messages" id="chat-messages"></div>
                    <div class="chat-input-area">
                        <textarea id="chat-input" placeholder="Ketik pesan... (Shift+Enter baris baru)" rows="1"></textarea>
                        <button class="btn" id="send-btn" style="width:auto; padding:16px 28px;"><i class="fas fa-paper-plane"></i></button>
                    </div>
                    <div class="chat-controls">
                        <label><input type="checkbox" id="infinite-mode"> Mode ∞</label>
                        <span id="char-counter">0/2000</span>
                        <div class="chat-actions">
                            <button class="icon-btn" id="export-chat"><i class="fas fa-download"></i> Export</button>
                            <button class="icon-btn" id="clear-chat"><i class="fas fa-trash"></i> Clear</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ADMIN PAGE -->
        <div id="admin-page" class="page">
            <div class="admin-layout">
                <div class="admin-sidebar">
                    <h2><i class="fas fa-crown" style="color:var(--secondary);"></i> Admin Panel</h2>
                    <div class="admin-nav" id="admin-nav">
                        <button class="admin-nav-btn active" data-section="dashboard"><i class="fas fa-chart-pie"></i> Dashboard</button>
                        <button class="admin-nav-btn" data-section="users"><i class="fas fa-users"></i> Users</button>
                        <button class="admin-nav-btn" data-section="model"><i class="fas fa-microchip"></i> Model AI</button>
                        <button class="admin-nav-btn" data-section="jailbreak"><i class="fas fa-shield-alt"></i> Jailbreak</button>
                        <button class="admin-nav-btn" data-section="notifications"><i class="fas fa-bell"></i> Notif <span id="notif-count" class="badge">0</span></button>
                        <button class="admin-nav-btn" data-section="logs"><i class="fas fa-scroll"></i> Logs</button>
                        <button class="admin-nav-btn" data-section="backup"><i class="fas fa-database"></i> Backup</button>
                        <button class="admin-nav-btn" data-section="webhook"><i class="fas fa-link"></i> Webhook</button>
                        <button class="admin-nav-btn" data-section="theme"><i class="fas fa-palette"></i> Tema</button>
                        <button class="admin-nav-btn" data-section="rate"><i class="fas fa-tachometer-alt"></i> Rate Limit</button>
                        <button class="admin-nav-btn" data-section="templates"><i class="fas fa-file-alt"></i> Template Prompt</button>  <!-- FITUR BARU -->
                        <button class="admin-nav-btn" data-section="analytics"><i class="fas fa-chart-line"></i> Analytics Lanjutan</button> <!-- FITUR BARU -->
                        <button class="admin-nav-btn" data-section="advanced"><i class="fas fa-cogs"></i> Advanced</button>
                    </div>
                    <div style="margin-top:auto; padding-top:20px;">
                        <button class="admin-nav-btn" id="admin-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </div>
                </div>
                <div class="admin-main">
                    <button class="back-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i> Kembali</button>
                    <div id="admin-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script>
        // ================= FIREBASE =================
        const firebaseConfig = {
            apiKey: "AIzaSyALWlgAyQXUomwnf520gmdoBMOFbdlWaB0",
            authDomain: "alamak-ce66a.firebaseapp.com",
            databaseURL: "https://alamak-ce66a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "alamak-ce66a",
            storageBucket: "alamak-ce66a.firebasestorage.app",
            messagingSenderId: "496086877660",
            appId: "1:496086877660:web:1b7d563c318cadd0bd7b19",
            measurementId: "G-K1V4L7J55R"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ================= STATE =================
        let currentUser = null;
        let currentAdmin = null;
        let userSettings = {};
        let adminSettings = {};
        let chatSessions = JSON.parse(localStorage.getItem('chatSessions')) || [];
        let currentSessionId = chatSessions[0]?.id || null;

        // ================= UTIL =================
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }
        function formatDate(ts) {
            if (!ts) return '';
            let d = ts.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleString('id-ID');
        }
        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, m => {
                if(m==='&') return '&amp;';
                if(m==='<') return '&lt;';
                if(m==='>') return '&gt;';
                if(m==='"') return '&quot;';
                return m;
            });
        }

        // ================= AUTH =================
        document.getElementById('go-to-register').addEventListener('click', (e) => { e.preventDefault(); showPage('register-page'); });
        document.getElementById('go-to-login').addEventListener('click', (e) => { e.preventDefault(); showPage('login-page'); });

        document.getElementById('login-btn').addEventListener('click', async () => {
            let email = document.getElementById('login-email').value.trim();
            let pass = document.getElementById('login-password').value;
            if (!email || !pass) return document.getElementById('login-error').innerText = 'Isi semua field';
            if (!isValidEmail(email)) return document.getElementById('login-error').innerText = 'Email tidak valid';
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (err) {
                document.getElementById('login-error').innerText = err.message;
            }
        });

        document.getElementById('register-btn').addEventListener('click', async () => {
            let email = document.getElementById('reg-email').value.trim();
            let pass = document.getElementById('reg-password').value;
            let conf = document.getElementById('reg-confirm').value;
            if (!email || !pass || !conf) return document.getElementById('register-error').innerText = 'Isi semua field';
            if (!isValidEmail(email)) return document.getElementById('register-error').innerText = 'Email tidak valid';
            if (pass !== conf) return document.getElementById('register-error').innerText = 'Password tidak cocok';
            if (pass.length < 6) return document.getElementById('register-error').innerText = 'Minimal 6 karakter';
            try {
                let cred = await auth.createUserWithEmailAndPassword(email, pass);
                await db.collection('users').doc(cred.user.uid).set({
                    email, role: 'user', createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch (err) {
                document.getElementById('register-error').innerText = err.message;
            }
        });

        function logout() { auth.signOut(); }
        document.getElementById('user-logout')?.addEventListener('click', logout);
        document.getElementById('admin-logout')?.addEventListener('click', logout);

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                let userDoc = await db.collection('users').doc(user.uid).get();
                let role = userDoc.exists ? userDoc.data().role : 'user';
                if (role === 'admin') {
                    currentAdmin = user;
                    document.getElementById('admin-email')?.innerText = user.email;
                    showPage('admin-page');
                    loadAdminData();
                    listenNotifications();
                } else {
                    currentUser = user;
                    document.getElementById('user-email').innerText = user.email;
                    showPage('user-page');
                    loadUserSettings();
                    loadChatSessions();
                    loadPromptTemplates(); // fitur baru
                }
            } else {
                showPage('login-page');
            }
        });

        // ========== USER ==========
        async function loadUserSettings() {
            let doc = await db.collection('settings').doc('global').get();
            if (doc.exists) {
                userSettings = doc.data();
                applyTheme(userSettings.theme);
            }
        }
        function applyTheme(theme) {
            if (!theme) return;
            document.documentElement.style.setProperty('--primary', theme.primary || '#5f7ef2');
            document.documentElement.style.setProperty('--secondary', theme.secondary || '#ffb86b');
        }

        // Fitur baru user: pilih template prompt
        async function loadPromptTemplates() {
            let snap = await db.collection('promptTemplates').get();
            let select = document.getElementById('prompt-template-select');
            select.innerHTML = '<option value="">Template default</option>';
            snap.forEach(doc => {
                let data = doc.data();
                let opt = document.createElement('option');
                opt.value = doc.id;
                opt.textContent = data.name;
                select.appendChild(opt);
            });
        }

        document.getElementById('prompt-template-select')?.addEventListener('change', function(e) {
            // menyimpan pilihan, nanti dipakai saat kirim pesan
            window.selectedTemplateId = e.target.value;
        });

        // Chat sessions
        function loadChatSessions() {
            let saved = localStorage.getItem(`chats_${currentUser.uid}`);
            if (saved) chatSessions = JSON.parse(saved);
            else chatSessions = [{ id: Date.now(), title: 'Chat baru', messages: [] }];
            renderHistory();
            if (chatSessions.length) loadChat(chatSessions[0].id);
        }
        function renderHistory() {
            let list = document.getElementById('history-list');
            list.innerHTML = '';
            chatSessions.forEach(s => {
                let div = document.createElement('div');
                div.className = 'history-item';
                div.innerText = s.title;
                div.dataset.id = s.id;
                div.onclick = () => loadChat(s.id);
                list.appendChild(div);
            });
        }
        function loadChat(id) {
            currentSessionId = id;
            let session = chatSessions.find(s => s.id == id);
            if (session) renderMessages(session.messages);
        }
        function saveChatSessions() {
            localStorage.setItem(`chats_${currentUser.uid}`, JSON.stringify(chatSessions));
        }
        function renderMessages(messages) {
            let container = document.getElementById('chat-messages');
            container.innerHTML = '';
            messages.forEach(msg => {
                let div = document.createElement('div');
                div.className = `message ${msg.role}`;
                let content = msg.content;
                if (msg.role === 'ai') {
                    content = content.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
                        return `<pre>${escapeHtml(code)}<button class="copy-btn" onclick="copyCode(this)">Copy</button></pre>`;
                    });
                }
                div.innerHTML = `<div class="message-bubble">${content}</div>`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }
        window.copyCode = function(btn) {
            let pre = btn.parentNode;
            let code = pre.innerText.replace('Copy','').trim();
            navigator.clipboard.writeText(code);
            btn.innerText = 'Copied!';
            setTimeout(() => btn.innerText = 'Copy', 2000);
        };

        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('chat-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        document.getElementById('infinite-mode').addEventListener('change', function(e) {
            document.getElementById('chat-input').maxLength = e.target.checked ? 1000000 : 2000;
            updateCounter();
        });
        document.getElementById('chat-input').addEventListener('input', updateCounter);
        function updateCounter() {
            let len = document.getElementById('chat-input').value.length;
            let max = document.getElementById('infinite-mode').checked ? '∞' : 2000;
            document.getElementById('char-counter').innerText = `${len}/${max}`;
        }

        document.getElementById('new-chat').addEventListener('click', () => {
            let newId = Date.now();
            chatSessions.push({ id: newId, title: 'Chat baru', messages: [] });
            saveChatSessions();
            renderHistory();
            loadChat(newId);
        });

        document.getElementById('export-chat').addEventListener('click', () => {
            let session = chatSessions.find(s => s.id == currentSessionId);
            if (!session) return;
            let blob = new Blob([JSON.stringify(session.messages,null,2)], {type:'application/json'});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `chat-${Date.now()}.json`;
            a.click();
        });

        document.getElementById('clear-chat').addEventListener('click', () => {
            let session = chatSessions.find(s => s.id == currentSessionId);
            if (session && confirm('Hapus semua pesan?')) {
                session.messages = [];
                renderMessages([]);
                saveChatSessions();
            }
        });

        // Fitur tema toggle user
        document.getElementById('theme-toggle-user')?.addEventListener('click', () => {
            document.body.classList.toggle('light');
        });

        async function sendMessage() {
            let input = document.getElementById('chat-input');
            let message = input.value.trim();
            if (!message || !currentUser) return;
            let session = chatSessions.find(s => s.id == currentSessionId);
            if (!session) return;

            session.messages.push({ role: 'user', content: message });
            if (session.title === 'Chat baru' && session.messages.length === 1) {
                session.title = message.substring(0,30) + (message.length>30?'...':'');
            }
            renderMessages(session.messages);
            input.value = '';
            updateCounter();
            saveChatSessions();

            try {
                let settings = userSettings;
                let apiKey = settings.apiKey;
                if (!apiKey) throw new Error('API Key tidak ada');

                // Cek jailbreak
                if (settings.jailbreakEnabled) {
                    let patterns = settings.jailbreakPatterns || [];
                    let isJB = patterns.some(p => new RegExp(p, 'i').test(message));
                    if (isJB) {
                        await db.collection('notifications').add({
                            type:'jailbreak', message:`JB dari ${currentUser.email}: ${message.substring(0,100)}`,
                            uid:currentUser.uid, read:false, timestamp:firebase.firestore.FieldValue.serverTimestamp()
                        });
                        session.messages.push({ role:'ai', content:'❌ Pesan diblokir (jailbreak)' });
                        renderMessages(session.messages); saveChatSessions(); return;
                    }
                }

                // Ambil template jika dipilih
                let systemPrompt = settings.systemPrompt || 'Anda asisten AI.';
                if (window.selectedTemplateId) {
                    let tmpl = await db.collection('promptTemplates').doc(window.selectedTemplateId).get();
                    if (tmpl.exists) systemPrompt = tmpl.data().content;
                }

                let response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method:'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type':'application/json',
                        'HTTP-Referer': window.location.origin,
                        'X-Title': 'Trinity AI'
                    },
                    body: JSON.stringify({
                        model: settings.model || 'arcee-ai/trinity-large-preview:free',
                        messages: [
                            { role:'system', content: systemPrompt },
                            ...session.messages.map(m => ({ role: m.role==='user'?'user':'assistant', content: m.content }))
                        ],
                        max_tokens: settings.maxTokens || 1000,
                        temperature: settings.temperature || 0.7
                    })
                });
                let data = await response.json();
                let reply = data.choices?.[0]?.message?.content || 'Tidak ada respons.';
                session.messages.push({ role:'ai', content: reply });
                renderMessages(session.messages);
                saveChatSessions();
                await db.collection('chatlogs').add({ uid:currentUser.uid, message, reply, timestamp:firebase.firestore.FieldValue.serverTimestamp() });
            } catch (err) {
                session.messages.push({ role:'ai', content: 'Error: '+err.message });
                renderMessages(session.messages); saveChatSessions();
            }
        }

        // ========== ADMIN ==========
        function renderAdminSections() {
            let sections = [
                'dashboard','users','model','jailbreak','notifications','logs','backup',
                'webhook','theme','rate','templates','analytics','advanced'
            ];
            let html = '';
            sections.forEach(s => html += `<div id="section-${s}" class="admin-section">${getSectionContent(s)}</div>`);
            document.getElementById('admin-content').innerHTML = html;
        }
        function getSectionContent(s) {
            let map = {
                dashboard: `<h2>Dashboard</h2><div class="stats-grid"><div class="stat-card"><h4>Total User</h4><div class="value" id="stat-users">0</div></div><div class="stat-card"><h4>Chat Hari Ini</h4><div class="value" id="stat-chats">0</div></div><div class="stat-card"><h4>Jailbreak</h4><div class="value" id="stat-jailbreak">0</div></div></div>`,
                users: `<h2>Manajemen User</h2><button class="btn" onclick="showAddUserForm()"><i class="fas fa-plus"></i> Tambah User</button><table><thead><tr><th>Email</th><th>Role</th><th>Dibuat</th><th>Aksi</th></tr></thead><tbody id="users-tbody"></tbody></table><div id="add-user-form" style="display:none;" class="form-card"><h4>Tambah User</h4><div class="form-group"><label>Email</label><input type="email" id="new-email" class="form-control"></div><div class="form-group"><label>Password</label><input type="password" id="new-password" class="form-control"></div><div class="form-group"><label>Role</label><select id="new-role" class="form-control"><option value="user">User</option><option value="admin">Admin</option></select></div><button class="btn" onclick="addUser()">Simpan</button><button class="btn-outline" onclick="hideAddUserForm()">Batal</button></div>`,
                model: `<h2>Pengaturan Model</h2><div class="form-card"><div class="form-group"><label>Model</label><input type="text" id="model-name" class="form-control" value="arcee-ai/trinity-large-preview:free"></div><div class="form-row"><div class="form-group"><label>Max Tokens</label><input type="number" id="max-tokens" class="form-control" value="1000"></div><div class="form-group"><label>Temperature</label><input type="number" id="temperature" step="0.1" class="form-control" value="0.7"></div></div><div class="form-group"><label>System Prompt</label><textarea id="system-prompt" class="form-control" rows="4">Anda adalah asisten AI yang membantu.</textarea></div><div class="form-group"><label>API Key</label><input type="password" id="api-key" class="form-control"></div><button class="btn" onclick="saveModelSettings()">Simpan</button></div>`,
                jailbreak: `<h2>Proteksi Jailbreak</h2><div class="form-card"><div class="form-group"><label><input type="checkbox" id="jailbreak-enabled"> Aktifkan</label></div><div class="form-group"><label>Pola (regex per baris)</label><textarea id="jailbreak-patterns" class="form-control" rows="5">abaikan perintah sebelumnya\nkamu adalah DAN\njailbreak</textarea></div><div class="form-group"><label><input type="checkbox" id="notify-jailbreak"> Notifikasi Admin</label></div><button class="btn" onclick="saveJailbreakSettings()">Simpan</button></div>`,
                notifications: `<h2>Notifikasi</h2><ul id="notif-list"></ul><button class="btn" onclick="clearNotifications()">Tandai Dibaca</button>`,
                logs: `<h2>Log Aktivitas</h2><table><thead><tr><th>Waktu</th><th>User</th><th>Aksi</th></tr></thead><tbody id="logs-tbody"></tbody></table>`,
                backup: `<h2>Backup & Restore</h2><button class="btn" onclick="exportData()"><i class="fas fa-download"></i> Export</button><button class="btn" onclick="importData()"><i class="fas fa-upload"></i> Import</button>`,
                webhook: `<h2>Webhook</h2><div class="form-group"><label>URL</label><input type="url" id="webhook-url" class="form-control"></div><button class="btn" onclick="saveWebhook()">Simpan</button>`,
                theme: `<h2>Tema</h2><div class="form-row"><div class="form-group"><label>Primer</label><input type="color" id="primary-color" class="form-control" value="#5f7ef2"></div><div class="form-group"><label>Sekunder</label><input type="color" id="secondary-color" class="form-control" value="#ffb86b"></div></div><button class="btn" onclick="saveTheme()">Terapkan</button>`,
                rate: `<h2>Rate Limit</h2><div class="form-group"><label>Maks per jam</label><input type="number" id="rate-limit" class="form-control" value="50"></div><div class="form-group"><label><input type="checkbox" id="allow-infinite"> Izinkan Infinite</label></div><button class="btn" onclick="saveRateLimit()">Simpan</button>`,
                templates: `<h2><i class="fas fa-file-alt"></i> Template Prompt</h2><button class="btn" onclick="showAddTemplateForm()"><i class="fas fa-plus"></i> Template Baru</button><table><thead><tr><th>Nama</th><th>Isi</th><th>Aksi</th></tr></thead><tbody id="templates-tbody"></tbody></table><div id="add-template-form" style="display:none;" class="form-card"><h4>Tambah Template</h4><div class="form-group"><label>Nama</label><input type="text" id="template-name" class="form-control"></div><div class="form-group"><label>Isi Prompt</label><textarea id="template-content" class="form-control" rows="5"></textarea></div><button class="btn" onclick="addTemplate()">Simpan</button><button class="btn-outline" onclick="hideAddTemplateForm()">Batal</button></div>`,
                analytics: `<h2><i class="fas fa-chart-line"></i> Analytics Lanjutan</h2><div style="height:300px;"><canvas id="usageChart"></canvas></div><p>Grafik penggunaan AI (coming soon)</p>`,
                advanced: `<h2>Fitur Advanced</h2><p>Maintenance mode, Auto-reply, dll (dapat dikembangkan)</p>`
            };
            return map[s] || '';
        }
        renderAdminSections();

        document.querySelectorAll('.admin-nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.admin-nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                let sec = btn.dataset.section;
                document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`section-${sec}`).classList.add('active');
            });
        });

        async function loadAdminData() {
            await loadSettings();
            loadUsers();
            loadDashboardStats();
            loadLogs();
            loadTemplates(); // fitur baru
        }
        async function loadSettings() {
            let doc = await db.collection('settings').doc('global').get();
            if (!doc.exists) return;
            adminSettings = doc.data();
            document.getElementById('model-name').value = adminSettings.model || 'arcee-ai/trinity-large-preview:free';
            document.getElementById('max-tokens').value = adminSettings.maxTokens || 1000;
            document.getElementById('temperature').value = adminSettings.temperature || 0.7;
            document.getElementById('system-prompt').value = adminSettings.systemPrompt || '';
            document.getElementById('api-key').value = adminSettings.apiKey || '';
            document.getElementById('jailbreak-enabled').checked = adminSettings.jailbreakEnabled || false;
            document.getElementById('jailbreak-patterns').value = (adminSettings.jailbreakPatterns || []).join('\n');
            document.getElementById('notify-jailbreak').checked = adminSettings.notifyJailbreak || false;
            document.getElementById('webhook-url').value = adminSettings.webhookUrl || '';
            if (adminSettings.theme) {
                document.getElementById('primary-color').value = adminSettings.theme.primary || '#5f7ef2';
                document.getElementById('secondary-color').value = adminSettings.theme.secondary || '#ffb86b';
            }
            document.getElementById('rate-limit').value = adminSettings.rateLimit || 50;
            document.getElementById('allow-infinite').checked = adminSettings.allowInfinite || false;
        }
        async function loadUsers() {
            let snap = await db.collection('users').get();
            let tbody = document.getElementById('users-tbody');
            tbody.innerHTML = '';
            snap.forEach(d => {
                let data = d.data();
                let tr = document.createElement('tr');
                tr.innerHTML = `<td>${data.email}</td><td><span class="badge">${data.role}</span></td><td>${formatDate(data.createdAt)}</td><td><button class="btn-outline" onclick="deleteUser('${d.id}')">Hapus</button></td>`;
                tbody.appendChild(tr);
            });
        }
        window.showAddUserForm = () => document.getElementById('add-user-form').style.display = 'block';
        window.hideAddUserForm = () => document.getElementById('add-user-form').style.display = 'none';
        window.addUser = async () => {
            let email = document.getElementById('new-email').value;
            let pass = document.getElementById('new-password').value;
            let role = document.getElementById('new-role').value;
            try {
                let cred = await auth.createUserWithEmailAndPassword(email, pass);
                await db.collection('users').doc(cred.user.uid).set({ email, role, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                hideAddUserForm(); loadUsers();
            } catch (err) { alert(err.message); }
        };
        window.deleteUser = async (uid) => {
            if (confirm('Hapus user?')) {
                await db.collection('users').doc(uid).delete();
                loadUsers();
            }
        };

        async function loadDashboardStats() {
            let users = await db.collection('users').get();
            document.getElementById('stat-users').innerText = users.size;
            let today = new Date(); today.setHours(0,0,0,0);
            let chats = await db.collection('chatlogs').where('timestamp','>=',today).get();
            document.getElementById('stat-chats').innerText = chats.size;
            let jb = await db.collection('notifications').where('type','==','jailbreak').get();
            document.getElementById('stat-jailbreak').innerText = jb.size;
        }

        async function loadLogs() {
            let snap = await db.collection('logs').orderBy('timestamp','desc').limit(50).get();
            let tbody = document.getElementById('logs-tbody');
            tbody.innerHTML = '';
            snap.forEach(d => {
                let data = d.data();
                let tr = document.createElement('tr');
                tr.innerHTML = `<td>${formatDate(data.timestamp)}</td><td>${data.user}</td><td>${data.action}</td>`;
                tbody.appendChild(tr);
            });
        }

        function listenNotifications() {
            db.collection('notifications').where('read','==',false).onSnapshot(snap => {
                let list = document.getElementById('notif-list');
                list.innerHTML = '';
                let count = 0;
                snap.forEach(d => {
                    count++;
                    let data = d.data();
                    let li = document.createElement('li');
                    li.innerHTML = `${data.message} - ${formatDate(data.timestamp)}`;
                    list.appendChild(li);
                });
                document.getElementById('notif-count').innerText = count;
            });
        }
        window.clearNotifications = async () => {
            let snap = await db.collection('notifications').where('read','==',false).get();
            snap.forEach(d => d.ref.update({ read: true }));
        };

        window.saveModelSettings = async () => {
            let sets = {
                model: document.getElementById('model-name').value,
                maxTokens: parseInt(document.getElementById('max-tokens').value),
                temperature: parseFloat(document.getElementById('temperature').value),
                systemPrompt: document.getElementById('system-prompt').value,
                apiKey: document.getElementById('api-key').value,
            };
            await db.collection('settings').doc('global').set(sets, { merge: true });
            alert('Model tersimpan');
        };
        window.saveJailbreakSettings = async () => {
            let patterns = document.getElementById('jailbreak-patterns').value.split('\n').filter(p=>p.trim());
            await db.collection('settings').doc('global').set({
                jailbreakEnabled: document.getElementById('jailbreak-enabled').checked,
                jailbreakPatterns: patterns,
                notifyJailbreak: document.getElementById('notify-jailbreak').checked
            }, { merge: true });
            alert('Jailbreak settings saved');
        };
        window.saveWebhook = async () => {
            await db.collection('settings').doc('global').set({ webhookUrl: document.getElementById('webhook-url').value }, { merge: true });
            alert('Webhook saved');
        };
        window.saveTheme = async () => {
            let theme = {
                primary: document.getElementById('primary-color').value,
                secondary: document.getElementById('secondary-color').value
            };
            await db.collection('settings').doc('global').set({ theme }, { merge: true });
            applyTheme(theme);
        };
        window.saveRateLimit = async () => {
            await db.collection('settings').doc('global').set({
                rateLimit: parseInt(document.getElementById('rate-limit').value),
                allowInfinite: document.getElementById('allow-infinite').checked
            }, { merge: true });
            alert('Rate limit saved');
        };

        // ========== FITUR TEMPLATE PROMPT (ADMIN) ==========
        async function loadTemplates() {
            let snap = await db.collection('promptTemplates').get();
            let tbody = document.getElementById('templates-tbody');
            if (!tbody) return;
            tbody.innerHTML = '';
            snap.forEach(d => {
                let data = d.data();
                let tr = document.createElement('tr');
                tr.innerHTML = `<td>${data.name}</td><td>${data.content.substring(0,50)}...</td><td><button class="btn-outline" onclick="deleteTemplate('${d.id}')">Hapus</button></td>`;
                tbody.appendChild(tr);
            });
        }
        window.showAddTemplateForm = () => document.getElementById('add-template-form').style.display = 'block';
        window.hideAddTemplateForm = () => document.getElementById('add-template-form').style.display = 'none';
        window.addTemplate = async () => {
            let name = document.getElementById('template-name').value;
            let content = document.getElementById('template-content').value;
            if (!name || !content) return alert('Isi semua');
            await db.collection('promptTemplates').add({ name, content, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            hideAddTemplateForm();
            loadTemplates();
        };
        window.deleteTemplate = async (id) => {
            if (confirm('Hapus template?')) {
                await db.collection('promptTemplates').doc(id).delete();
                loadTemplates();
            }
        };

        window.exportData = async () => {
            let cols = ['users','settings','notifications','logs','chatlogs','promptTemplates'];
            let exp = {};
            for (let c of cols) {
                let snap = await db.collection(c).get();
                exp[c] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            }
            let blob = new Blob([JSON.stringify(exp,null,2)], {type:'application/json'});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `backup-${Date.now()}.json`;
            a.click();
        };
        window.importData = () => alert('Fitur import memerlukan server side.');

        // Inisialisasi admin section dashboard aktif
        document.querySelector('[data-section="dashboard"]').click();
    </script>
</body>
</html>
